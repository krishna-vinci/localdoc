# LocalDocs Hub Production Environment
# Uses multi-stage Dockerfile.prod builds; no source mounts

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: localdocs-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-localdocs}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # db port is NOT exposed in production (internal only)

  # Backend API - FastAPI production build
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: localdocs-backend
    restart: always
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-localdocs}
      DEBUG: "false"
      FILESYSTEM_ROOT: /host
      HOST: 0.0.0.0
      PORT: 4320
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4321}
    ports:
      - "4320:4320"
    volumes:
      - /:/host:rw
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 4320 --workers 4"

  # Frontend - Next.js production build (standalone)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: localdocs-frontend
    restart: always
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL:-http://backend:4320}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4320}
      NODE_ENV: production
      PORT: 4321
      HOSTNAME: 0.0.0.0
    ports:
      - "4321:4321"
    depends_on:
      - backend

volumes:
  postgres_data:
