# LocalDocs Hub Development Environment
# Hot-reload enabled for both backend and frontend

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: localdocs-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: localdocs
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API - FastAPI with hot reload
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: localdocs-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DEBUG: "true"
      FILESYSTEM_ROOT: /host
      HOST: 0.0.0.0
      PORT: 4320
      CORS_ORIGINS: ${CORS_ORIGINS}
    ports:
      - "4320:4320"
    volumes:
      - ./backend:/app:rw
      - /:/host:rw
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 4320 --reload"

  # Frontend - Next.js with hot reload
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: localdocs-frontend
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      INTERNAL_API_URL: ${INTERNAL_API_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_ALLOWED_DEV_ORIGINS: ${NEXT_ALLOWED_DEV_ORIGINS}
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "4321:4321"
    volumes:
      - ./frontend:/app:rw
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  frontend_node_modules:
